name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=ingestion --cov-report=term-missing

      - name: Check no .env file committed
        run: |
          if [ -f .env ]; then
            echo "ERROR: .env file found in repo — remove it immediately!"
            exit 1
          fi
          echo ".env not committed — good."
